<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-340 -340 1908 1903" style="overflow: visible;">
  <style>
    @keyframes mm-gather {
      0%   { transform: translate(var(--dx, 0), var(--dy, 0)); opacity: 0; }
      30%  { opacity: 1; }
      55%, 100% { transform: translate(0, 0); opacity: 1; }
    }
    circle {
      animation: mm-gather 4s cubic-bezier(0.22, 1, 0.36, 1) infinite;
      transform-box: fill-box;
    }
    circle.b { animation-delay: 0s; }
    circle.y { animation-delay: 0.45s; }
    circle.r { animation-delay: 0.9s; }
    @media (prefers-reduced-motion: reduce) {
      circle { animation: none; }
    }
  </style>
