services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-moimio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moimio_dev}
      POSTGRES_DB: ${POSTGRES_DB:-moimio}
    ports:
      - "${DB_PORT:-6122}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moimio}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # v1.0.0k-2: prevent Python from writing .pyc files into the
      # ./backend/app bind mount below. The backend container runs as
      # root (default for the python:3.12-slim image), so any .pyc
      # files Python writes during runtime appear on the host owned
      # by root — making `rm -rf moimio-ce/` fail for the
      # unprivileged host user during redeploys. Setting this is
      # cheaper than reworking the image to run as a non-root user
      # matching the host UID. Slight cold-start cost on first
      # request after rebuild is negligible.
      PYTHONDONTWRITEBYTECODE: "1"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-moimio}:${POSTGRES_PASSWORD:-moimio_dev}@db:5432/${POSTGRES_DB:-moimio}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-64-chars-minimum}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:6120}
      RATE_LIMIT_REGISTRATION: ${RATE_LIMIT_REGISTRATION:-10}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Moimio}
      SMTP_TLS: ${SMTP_TLS:-true}
      SMTP_SSL: ${SMTP_SSL:-false}
      # v1.0.0g-3: capability flags + outbound webhook config.
      # Each var must be listed here for Compose to pass it from .env
      # into the container — vars in .env but not here are ignored.
      FEATURE_ALLOCATION: ${FEATURE_ALLOCATION:-true}
      FEATURE_OUTBOUND_WEBHOOKS: ${FEATURE_OUTBOUND_WEBHOOKS:-true}
      FEATURE_CREATE_EVENT_CONFIRMATION: ${FEATURE_CREATE_EVENT_CONFIRMATION:-false}
      EVENT_CHARGE_AMOUNT: ${EVENT_CHARGE_AMOUNT:-}
      EVENT_CHARGE_CURRENCY: ${EVENT_CHARGE_CURRENCY:-}
      BILLING_CARD_LAST4: ${BILLING_CARD_LAST4:-}
      MOIMIO_TENANT_ID: ${MOIMIO_TENANT_ID:-}
      MOIMIO_WEBHOOK_URL: ${MOIMIO_WEBHOOK_URL:-}
      MOIMIO_WEBHOOK_SECRET: ${MOIMIO_WEBHOOK_SECRET:-}
      WEBHOOK_DELIVERY_RETENTION_DAYS: ${WEBHOOK_DELIVERY_RETENTION_DAYS:-30}
    ports:
      - "${BACKEND_PORT:-6121}:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:6121}
    ports:
      - "${FRONTEND_PORT:-6120}:5173"
    # The frontend container runs a multistage production build:
    # Vite produces the static bundle, Caddy serves it from /srv and
    # reverse-proxies /api/* and /health to the backend. There is no
    # source volume mount — host edits to ./frontend/src do not affect
    # the running container. To pick up frontend code changes, rebuild
    # the image: `docker compose build --no-cache frontend`.
    depends_on:
      - backend

volumes:
  pgdata:
