name: Build and publish container images

# Triggers:
#   - push to main → builds with sha-<short> tag (verification build)
#   - push of v* tag → builds with that tag name (release build)
#   - manual dispatch → builds the current ref with sha tag
#
# CE convention: version tags only (no auto-`latest`). This means
# downstream consumers (the SaaS provisioning layer, individual
# self-hosters) always pin to a specific version. Reproducibility
# over convenience — locked during SaaS scoping discussions.
#
# Builds two images per run via matrix:
#   - ghcr.io/jc-universe87/moimio-backend
#   - ghcr.io/jc-universe87/moimio-frontend

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image name pattern: ghcr.io/jc-universe87/moimio-<component>
          # github.repository is "jc-universe87/moimio" → image becomes
          # "moimio-backend" / "moimio-frontend".
          images: ${{ env.REGISTRY }}/${{ env.REPO }}-${{ matrix.component.name }}
          # Tagging strategy:
          #   - sha-abc1234  on every push (immutable, traceable)
          #   - main         on push to main branch (floats with HEAD)
          #   - v1.0.0j      when the matching git tag is pushed
          # NO `latest` — version tags only by CE convention.
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=tag

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.component.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-component cache scope — backend and frontend don't
          # share base layers, so scoping the cache avoids cross-
          # contamination and improves hit rate.
          cache-from: type=gha,scope=${{ matrix.component.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}
